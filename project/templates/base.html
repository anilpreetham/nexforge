{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}NexForge Automation{% endblock %}</title>
  <meta name="description" content="{% block meta %}Industrial automation, IIoT, robotics.{% endblock %}">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><rect width='16' height='16' rx='3' fill='%230B2E59'/><text x='8' y='12' font-size='11' fill='%23F57C00' text-anchor='middle' font-family='sans-serif' font-weight='bold'>N</text></svg>">

</html>
