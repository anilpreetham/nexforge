{% if GOOGLE_MAPS_API_KEY and location %}
<div class="map-embed mt-3">
  <iframe
    width="100%"
    height="300"
    style="border:0;border-radius:8px"
    loading="lazy"
    allowfullscreen
    referrerpolicy="no-referrer-when-downgrade"
    src="https://www.google.com/maps/embed/v1/place?key={{ GOOGLE_MAPS_API_KEY }}&q={{ location|urlencode }}">
  </iframe>
</div>
{% endif %}
